# update-tree.yml
#
# Regenerates the family tree images and data.json whenever:
#   - You push to main
#   - You manually trigger it (Actions → Run workflow)
#
# SETUP:
#   1. Publish your Google Sheet as CSV (File → Share → Publish to web → CSV)
#   2. In your GitHub repo: Settings → Secrets and variables → Actions → New secret
#      Name:  SHEET_CSV_URL
#      Value: <your published CSV URL>
#   3. Push this workflow file. GitHub Pages will serve docs/ automatically.

name: Update Family Tree

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "main.py"
      - "docs/index.html"
  workflow_dispatch:   # allow manual trigger from the Actions tab
  schedule:
    - cron: "0 6 * * *"   # optional: auto-refresh daily at 6 AM UTC

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anytree

      - name: Install Graphviz
        run: sudo apt-get install -y graphviz

      - name: Generate tree outputs
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: python main.py --generate="$SHEET_CSV_URL"

      - name: Commit updated outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/alumni-year-pc.csv output/ docs/data.json
          git diff --cached --quiet || git commit -m "chore: regenerate family tree outputs [skip ci]"
          git push
